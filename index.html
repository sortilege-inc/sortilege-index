<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sortilege — Project Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ============ Palette drawn from the illuminated-tile logo ============ */
    :root {
      --slate:     #5c7a90;
      --navy:      #34475d;
      --plum:      #5b4a63;
      --violet:    #7b6aa6;
      --terracotta:#b45a34;
      --orange:    #d98a3b;
      --coral:     #cc4f48;
      --teal:      #4d7d6d;
      --forest:    #375442;

      --bg-1:   #f7f2e7;   /* warm cream light */
      --bg-2:   #ece3d1;   /* cream shadow     */
      --panel:  #fbf7ee;   /* tile / card face */
      --panel-2:#f3ecdb;
      --line:   #cfc3a8;   /* neutral frame    */
      --ink:    #3a3428;   /* warm dark text   */
      --ink-soft:#6f6650;
    }
    :root[data-theme="dark"] {
      --slate:#7ea0b6; --navy:#6b86a2; --plum:#9784ab; --violet:#a08fce;
      --terracotta:#d3764a; --orange:#e6a256; --coral:#e06b62; --teal:#6fa693; --forest:#6a9678;
      --bg-1:#211d17; --bg-2:#161310; --panel:#2a251d; --panel-2:#231f18;
      --line:#4a4130; --ink:#efe7d3; --ink-soft:#b7aa8c;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: radial-gradient(1200px 720px at 50% -12%, var(--bg-1) 0%, var(--bg-2) 82%) fixed;
      color: var(--ink);
      font-family: "EB Garamond", "Iowan Old Style", Palatino, Georgia, serif;
      font-size: 18px;
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1140px; margin: 0 auto; padding: clamp(1.5rem, 4vw, 3.5rem) 1.25rem 4.5rem; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }

    /* ---------- Framed tile decoration (double rule + corner marks) ---------- */
    .frame { position: relative; background: linear-gradient(158deg, var(--panel), var(--panel-2)); }
    .frame::before {
      content: ""; position: absolute; inset: 5px; pointer-events: none;
      border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .frame::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--accent), var(--accent)), linear-gradient(var(--accent), var(--accent)),
        linear-gradient(var(--accent), var(--accent)), linear-gradient(var(--accent), var(--accent));
      background-repeat: no-repeat; background-size: 7px 7px;
      background-position: 3px 3px, calc(100% - 3px) 3px, 3px calc(100% - 3px), calc(100% - 3px) calc(100% - 3px);
    }

    /* ---------- Header / wordmark ---------- */
    header { text-align: center; margin-bottom: clamp(2.4rem, 6vw, 4rem); }
    .wordmark {
      display: flex; flex-wrap: wrap; justify-content: center; gap: clamp(6px, 1.4vw, 12px);
    }
    .glyph {
      --accent: var(--slate);
      width: clamp(58px, 9.5vw, 104px); aspect-ratio: 1;
      border: 1.5px solid var(--accent);
      display: grid; place-items: center;
      font-family: "Cinzel", serif; font-weight: 600;
      font-size: clamp(1.9rem, 5vw, 3.4rem);
      color: var(--accent);
      box-shadow: 0 6px 20px rgba(58, 44, 24, 0.10);
    }
    .glyph:nth-child(1){ --accent: var(--slate); }
    .glyph:nth-child(2){ --accent: var(--navy); }
    .glyph:nth-child(3){ --accent: var(--plum); }
    .glyph:nth-child(4){ --accent: var(--violet); }
    .glyph:nth-child(5){ --accent: var(--terracotta); }
    .glyph:nth-child(6){ --accent: var(--teal); }
    .glyph:nth-child(7){ --accent: var(--orange); }
    .glyph:nth-child(8){ --accent: var(--coral); }
    .glyph:nth-child(9){ --accent: var(--forest); }

    .tagline {
      margin: 1.6rem 0 0; color: var(--ink-soft); font-style: italic;
      font-size: 1.12rem; letter-spacing: 0.01em;
    }
    .ornament {
      display: flex; align-items: center; justify-content: center; gap: 0.8rem;
      margin-top: 1.1rem; color: var(--terracotta);
    }
    .ornament::before, .ornament::after {
      content: ""; height: 1px; width: clamp(60px, 18vw, 180px);
      background: linear-gradient(90deg, transparent, var(--line));
    }
    .ornament::after { background: linear-gradient(90deg, var(--line), transparent); }
    .ornament span { transform: rotate(45deg); width: 8px; height: 8px; background: var(--terracotta); }

    /* ---------- Tabs ---------- */
    .tabs {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 0.3rem;
      margin: 0 auto clamp(1.8rem, 4vw, 2.6rem);
      border-bottom: 1px solid var(--line);
    }
    .tab {
      font-family: "Cinzel", serif; font-weight: 600; font-size: 0.9rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: none; border: none; color: var(--ink-soft);
      padding: 0.7rem 1.4rem; cursor: pointer; margin-bottom: -1px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .tab:hover { color: var(--ink); }
    .tab[aria-selected="true"] { color: var(--terracotta); border-bottom-color: var(--terracotta); }
    .tab:focus-visible { outline: 2px solid var(--slate); outline-offset: 2px; }

    .tabpanel[hidden] { display: none; }
    .placeholder {
      text-align: center; color: var(--ink-soft); font-style: italic; font-size: 1.15rem;
      padding: clamp(2.5rem, 10vw, 6rem) 1.5rem;
    }

    /* ---------- Groups ---------- */
    .group { margin-top: clamp(2.6rem, 5vw, 3.6rem); }
    .group:first-child { margin-top: 0; }
    .group h2 {
      font-family: "Cinzel", serif; font-weight: 600;
      font-size: clamp(1.25rem, 2.6vw, 1.6rem);
      margin: 0 0 0.15rem; color: var(--accent);
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      letter-spacing: 0.02em;
    }
    .group h2::before {
      content: ""; width: 0.5em; height: 0.5em; flex: none;
      background: var(--accent); transform: rotate(45deg);
    }
    .group h2 .count {
      font-family: "EB Garamond", serif; font-size: 0.82rem; font-weight: 400;
      color: var(--ink-soft); font-style: italic; letter-spacing: 0.02em;
    }
    .group > p.blurb { margin: 0.1rem 0 1.25rem; color: var(--ink-soft); font-size: 1.02rem; }

    /* ---------- Project table (one row per project) ---------- */
    .panel { padding: clamp(0.4rem, 1.4vw, 0.9rem) clamp(0.7rem, 2vw, 1.3rem); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-family: "Cinzel", serif; font-weight: 600; font-size: 0.7rem;
      letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent);
      text-align: left; padding: 0.6rem 0.8rem; border-bottom: 1.5px solid var(--accent);
      white-space: nowrap;
    }
    thead th.col-updated, thead th.col-status, thead th.col-links { width: 1%; }
    thead th.col-links { text-align: right; }
    th.col-updated, td.col-updated { white-space: nowrap; }
    td.col-updated { color: var(--ink-soft); font-size: 0.9rem; font-variant-numeric: tabular-nums; }
    tbody td { padding: 0.7rem 0.8rem; vertical-align: middle; border-bottom: 1px solid var(--line); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s ease; }
    tbody tr:hover td { background: color-mix(in srgb, var(--accent) 9%, transparent); }

    .proj-name { font-family: "Cinzel", serif; font-weight: 600; font-size: 0.98rem; color: var(--ink); line-height: 1.3; }
    .proj-desc { color: var(--ink-soft); font-size: 0.92rem; margin-top: 0.12rem; }
    .proj-desc.empty { opacity: 0.4; font-style: italic; }

    td.col-status { white-space: nowrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: "EB Garamond", serif; font-size: 0.86rem; font-weight: 500;
      padding: 0.16rem 0.62rem; border: 1px solid currentColor; border-radius: 999px;
      white-space: nowrap;
    }
    .badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    td.col-links { text-align: right; white-space: nowrap; }
    .links { display: inline-flex; flex-wrap: wrap; gap: 0.5rem; justify-content: flex-end; }
    a.pill {
      display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none;
      font-family: "EB Garamond", serif; font-size: 0.92rem; font-weight: 500;
      padding: 0.28rem 0.7rem; border: 1px solid var(--accent); background: transparent;
      color: var(--accent); transition: background 0.15s ease, color 0.15s ease;
    }
    a.pill svg { width: 14px; height: 14px; }
    a.pill.gh:hover { background: var(--ink); color: var(--panel); border-color: var(--ink); }
    a.pill.web { background: var(--accent); color: var(--panel); }
    a.pill.web:hover { filter: brightness(1.08); }

    /* Editorial status set by hand reads solid; a status inferred from activity
       is drawn with a dashed ring so the two are never confused. */
    .badge.derived { border-style: dashed; opacity: 0.82; }

    /* ---------- State + Standards columns (generated from live GitHub data) ---------- */
    thead th.col-state, thead th.col-standards { width: 1%; }
    td.col-state, td.col-standards { white-space: nowrap; }

    .state {
      display: inline-flex; align-items: center; gap: 0.45rem;
      font-size: 0.84rem; font-weight: 500; color: var(--state, var(--ink-soft));
    }
    .state .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex: none; }
    .state .ci { font-size: 0.78rem; line-height: 1; letter-spacing: 0.02em; opacity: 0.9; }
    .state .ci.ok   { color: var(--teal); }
    .state .ci.fail { color: var(--coral); }
    .state .ci.run  { color: var(--orange); }

    /* Standards checklist: R eadme · L icense · C I workflow. Filled = present. */
    .pips { display: inline-flex; gap: 5px; }
    .pip {
      width: 18px; height: 18px; border-radius: 50%; display: inline-flex;
      align-items: center; justify-content: center; font-size: 0.66rem; font-weight: 600;
      font-family: "Cinzel", serif; border: 1px solid var(--line);
      color: var(--ink-soft); background: transparent;
    }
    .pip.on { color: var(--panel); background: var(--forest); border-color: var(--forest); }
    .pip.off { opacity: 0.5; }

    /* ---------- Untracked repositories (drift surfaced by the generator) ---------- */
    .untracked { margin-top: 2.4rem; }
    .untracked .list { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.4rem; }
    .untracked .chip {
      display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none;
      font-size: 0.9rem; color: var(--ink); border: 1px solid var(--line);
      background: var(--panel); padding: 0.32rem 0.7rem;
    }
    .untracked .chip:hover { border-color: var(--accent); }
    .untracked .chip .when { color: var(--ink-soft); font-size: 0.8rem; font-variant-numeric: tabular-nums; }
    .untracked .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--state, var(--ink-soft)); flex: none; }

    .meta-line {
      margin: 0.2rem 0 1.6rem; text-align: center;
      color: var(--ink-soft); font-size: 0.86rem; font-variant-numeric: tabular-nums;
    }
    .meta-line.stale-warn { color: var(--coral); }

    footer {
      margin-top: 4rem; padding-top: 1.6rem; text-align: center;
      color: var(--ink-soft); font-size: 0.95rem;
      border-top: 1px solid var(--line);
    }
    footer a { color: var(--terracotta); }

    .toggle {
      position: fixed; top: 1rem; right: 1rem;
      background: var(--panel); border: 1px solid var(--line); color: var(--ink);
      width: 42px; height: 42px; cursor: pointer; font-size: 1.05rem; line-height: 1;
      box-shadow: 0 4px 14px rgba(58, 44, 24, 0.14);
    }
    .toggle:hover { border-color: var(--terracotta); }
  </style>
</head>
<body>
  <button class="toggle" id="themeToggle" title="Toggle light/dark" aria-label="Toggle theme">◐</button>

  <div class="wrap">
    <header>
      <h1 class="sr-only">Sortilege</h1>
      <div class="wordmark" aria-hidden="true">
        <div class="glyph frame">S</div>
        <div class="glyph frame">O</div>
        <div class="glyph frame">R</div>
        <div class="glyph frame">T</div>
        <div class="glyph frame">I</div>
        <div class="glyph frame">L</div>
        <div class="glyph frame">E</div>
        <div class="glyph frame">G</div>
        <div class="glyph frame">E</div>
      </div>
      <p class="tagline">An index of our projects &amp; conjurings</p>
      <div class="ornament"><span></span></div>
    </header>

    <nav class="tabs" role="tablist" aria-label="Sections">
      <button class="tab" role="tab" id="tab-projects" aria-controls="panel-projects" aria-selected="true">Projects</button>
      <button class="tab" role="tab" id="tab-gm" aria-controls="panel-gm" aria-selected="false" tabindex="-1">GM</button>
      <button class="tab" role="tab" id="tab-player" aria-controls="panel-player" aria-selected="false" tabindex="-1">Player</button>
    </nav>

    <p class="meta-line" id="metaLine"></p>

    <main>
      <div class="tabpanel" id="panel-projects" role="tabpanel" aria-labelledby="tab-projects"></div>
      <div class="tabpanel" id="panel-gm" role="tabpanel" aria-labelledby="tab-gm" hidden>
        <div class="placeholder frame" style="--accent:var(--slate)">Game Master content coming soon.</div>
      </div>
      <div class="tabpanel" id="panel-player" role="tabpanel" aria-labelledby="tab-player" hidden>
        <div class="placeholder frame" style="--accent:var(--terracotta)">Player content coming soon.</div>
      </div>
    </main>

    <footer>
      Sortilege Inc. &middot; <a href="https://github.com/sortilege-inc">github.com/sortilege-inc</a>
    </footer>
  </div>

  <script>
    /* =========================================================================
       This page is DATA-DRIVEN. Do not edit project data here:
         · Editorial truth (groups, blurbs, descriptions, web links, hand-set
           `status`) lives in  catalog.json.
         · Live repo state (Last Updated, State, Standards) lives in  data.json,
           regenerated by  tools/gen.mjs  from GitHub via the `gh` CLI.
       Group accent colours cycle automatically through ACCENTS below.
       ========================================================================= */
    const ACCENTS = [
      "var(--slate)", "var(--terracotta)", "var(--plum)", "var(--teal)", "var(--orange)",
      "var(--violet)", "var(--coral)", "var(--navy)", "var(--forest)"
    ];

    // Status label -> badge color. Add your own; "Unknown" is the default.
    const STATUS = {
      "Unknown":       "var(--ink-soft)",
      "0.4-compliant": "var(--terracotta)",
      "Live":        "var(--teal)",
      "Active":      "var(--slate)",
      "In Progress": "var(--orange)",
      "Complete":    "var(--forest)",
      "On Hold":     "var(--coral)",
      "Draft":       "var(--violet)",
      "Archived":    "var(--plum)"
    };


    const GH_ICON = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>';
    const WEB_ICON = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true"><circle cx="8" cy="8" r="6.4"/><path d="M1.6 8h12.8M8 1.6c1.9 2 1.9 10.8 0 12.8M8 1.6c-1.9 2-1.9 10.8 0 12.8"/></svg>';

    const esc = s => (s || "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    /* ---------------------------------------------------------------------------
       Live state (data.json, generated by tools/gen.mjs) merged onto the catalog.
       The page is data-driven: editorial truth comes from catalog.json, live
       repo state from data.json. Neither is edited here.
       --------------------------------------------------------------------------- */

    // freshness bucket -> { label, colour } for the State column
    const FRESH = {
      fresh:    { label: "fresh",    color: "var(--teal)"     },
      active:   { label: "active",   color: "var(--slate)"    },
      stale:    { label: "dormant",  color: "var(--coral)"    },
      archived: { label: "archived", color: "var(--plum)"     },
      unknown:  { label: "—",        color: "var(--ink-soft)" },
    };
    // fallback Status label when the catalog sets no editorial status
    const DERIVED_STATUS = {
      fresh: "Active", active: "Maintained", stale: "Dormant",
      archived: "Archived", unknown: "Unknown",
    };
    const isoDate = s => (s ? String(s).slice(0, 10) : "");
    const ghUrl = (owner, repo) => `https://github.com/${owner}/${repo}`;

    function ciCell(run) {
      if (!run || (!run.conclusion && !run.status)) return "";
      const c = run.conclusion;
      if (c === "success")   return `<span class="ci ok" title="CI: success">✓ CI</span>`;
      if (c && c !== "success") return `<span class="ci fail" title="CI: ${esc(c)}">✗ CI</span>`;
      return `<span class="ci run" title="CI: ${esc(run.status || "running")}">● CI</span>`;
    }

    function stateCell(st) {
      if (!st) return `<span class="state">—</span>`;
      const f = FRESH[st.freshness] || FRESH.unknown;
      const ci = ciCell(st.lastRun);
      return `<span class="state" style="--state:${f.color}"><span class="dot"></span>${esc(f.label)}${ci ? " " + ci : ""}</span>`;
    }

    function standardsCell(st) {
      if (!st || !st.standards) return `<span class="pips"></span>`;
      const s = st.standards;
      const pip = (on, letter, name) =>
        `<span class="pip ${on ? "on" : "off"}" title="${name}: ${on ? "present" : "missing"}">${letter}</span>`;
      return `<span class="pips">${pip(s.readme, "R", "README")}${pip(s.license, "L", "License")}${pip(s.ci, "C", "CI workflow")}</span>`;
    }

    function statusCell(p, st) {
      const fr = (st && st.freshness) || "unknown";
      let label, derived = false;
      if (p.status && STATUS[p.status]) { label = p.status; }
      else { label = DERIVED_STATUS[fr] || "Unknown"; derived = true; }
      const color = STATUS[label] || (FRESH[fr] || FRESH.unknown).color;
      return `<span class="badge${derived ? " derived" : ""}" style="color:${color}"${derived ? ' title="inferred from activity"' : ""}>${esc(label)}</span>`;
    }

    function buildGroups(groups, owner, repos) {
      return groups.map((g, gi) => {
        if (!g.projects || !g.projects.length) return "";
        const accent = ACCENTS[gi % ACCENTS.length];
        const rows = g.projects.map(p => {
          const st = repos && repos[p.repo];
          const links = [`<a class="pill gh" href="${esc(ghUrl(owner, p.repo))}" target="_blank" rel="noopener">${GH_ICON} GitHub</a>`];
          if (p.web) links.push(`<a class="pill web" href="${esc(p.web)}" target="_blank" rel="noopener">${WEB_ICON} Website</a>`);
          const updated = isoDate(st && st.pushedAt) || p.updated || "—";
          const desc = p.desc ? `<div class="proj-desc">${esc(p.desc)}</div>` : `<div class="proj-desc empty">no description</div>`;
          return `<tr>
            <td>
              <div class="proj-name">${esc(p.name)}</div>
              ${desc}
            </td>
            <td class="col-updated">${esc(updated)}</td>
            <td class="col-status">${statusCell(p, st)}</td>
            <td class="col-state">${stateCell(st)}</td>
            <td class="col-standards">${standardsCell(st)}</td>
            <td class="col-links"><div class="links">${links.join("")}</div></td>
          </tr>`;
        }).join("");
        return `<section class="group" style="--accent:${accent}">
          <h2>${esc(g.name)} <span class="count">${g.projects.length} project${g.projects.length !== 1 ? "s" : ""}</span></h2>
          ${g.blurb ? `<p class="blurb">${esc(g.blurb)}</p>` : ""}
          <div class="panel frame">
            <table>
              <thead><tr>
                <th>Project</th>
                <th class="col-updated">Last Updated</th>
                <th class="col-status">Status</th>
                <th class="col-state">State</th>
                <th class="col-standards" title="README · License · CI workflow">Standards</th>
                <th class="col-links">Links</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>`;
      }).join("");
    }

    function buildUntracked(owner, list) {
      if (!list || !list.length) return "";
      const chips = list.map(r => {
        const f = FRESH[r.freshness] || FRESH.unknown;
        return `<a class="chip" href="${esc(ghUrl(owner, r.slug))}" target="_blank" rel="noopener" style="--state:${f.color}"><span class="dot"></span>${esc(r.slug)}<span class="when">${esc(isoDate(r.pushedAt) || "—")}</span></a>`;
      }).join("");
      return `<section class="group untracked" style="--accent:var(--coral)">
        <h2>Untracked repositories <span class="count">${list.length} in the org, not in the catalog</span></h2>
        <p class="blurb">Repos under <code>${esc(owner)}</code> not yet filed into a group above. Add them to <code>catalog.json</code> to track them, or leave them here as a drift signal.</p>
        <div class="list">${chips}</div>
      </section>`;
    }

    function renderTab(panelId, groups, owner, repos, accentVar, fallback, extra) {
      const html = (buildGroups(groups, owner, repos) + (extra || "")).trim();
      document.getElementById(panelId).innerHTML = html ||
        `<div class="placeholder frame" style="--accent:${accentVar}">${fallback}</div>`;
    }

    async function boot() {
      let catalog = null, data = null;
      try {
        catalog = await fetch("catalog.json", { cache: "no-cache" }).then(r => r.json());
      } catch (e) {
        document.getElementById("panel-projects").innerHTML =
          `<div class="placeholder frame" style="--accent:var(--coral)">Could not load catalog.json.</div>`;
        return;
      }
      try {
        data = await fetch("data.json", { cache: "no-cache" }).then(r => (r.ok ? r.json() : null));
      } catch (e) { data = null; }

      const owner = (data && data.owner) || catalog.owner || "sortilege-inc";
      const repos = (data && data.repos) || {};
      const byId = Object.fromEntries((catalog.tabs || []).map(t => [t.id, t]));

      renderTab("panel-projects", (byId.projects || {}).groups || [], owner, repos,
        "var(--terracotta)", "No projects yet.", buildUntracked(owner, data && data.untracked));
      renderTab("panel-gm", (byId.gm || {}).groups || [], owner, repos,
        "var(--slate)", "Game Master content coming soon.");
      renderTab("panel-player", (byId.player || {}).groups || [], owner, repos,
        "var(--terracotta)", "Player content coming soon.");

      const meta = document.getElementById("metaLine");
      if (meta) {
        if (data && data.generatedAt) {
          const c = data.counts || {};
          const ageDays = Math.floor((Date.now() - new Date(data.generatedAt).getTime()) / 86400000);
          let text = `Live state generated ${isoDate(data.generatedAt)} · ${c.tracked || 0} tracked · ${c.untracked || 0} untracked · ${c.org || 0} in org`;
          if (ageDays > 7) { text += ` · ${ageDays}d old — run tools/gen.mjs`; meta.classList.add("stale-warn"); }
          meta.textContent = text;
        } else {
          meta.textContent = "Live state not generated yet — run tools/gen.mjs to populate data.json";
          meta.classList.add("stale-warn");
        }
      }
    }
    boot();

    const root = document.documentElement;
    document.getElementById("themeToggle").addEventListener("click", () => {
      root.setAttribute("data-theme", root.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });

    /* ---------- Tabs: Projects / GM / Player ---------- */
    const tabs = [...document.querySelectorAll('.tab')];
    function activate(tab) {
      tabs.forEach(t => {
        const selected = t === tab;
        t.setAttribute('aria-selected', selected ? 'true' : 'false');
        t.tabIndex = selected ? 0 : -1;
        document.getElementById(t.getAttribute('aria-controls')).hidden = !selected;
      });
    }
    tabs.forEach((tab, i) => {
      tab.addEventListener('click', () => activate(tab));
      tab.addEventListener('keydown', e => {
        if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
        e.preventDefault();
        const next = tabs[(i + (e.key === 'ArrowRight' ? 1 : tabs.length - 1)) % tabs.length];
        activate(next); next.focus();
      });
    });
  </script>
</body>
</html>
